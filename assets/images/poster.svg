<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1180" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="1180" fill="#FFFFFF" />
  
  <!-- Outer Border -->
  <rect x="20" y="20" width="760" height="1140" fill="none" stroke="#000000" stroke-width="8" />

  <!-- Main Title -->
  <text x="40" y="110" fill="#000000" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="90" letter-spacing="-2">NO PARTY.</text>
  <text x="40" y="200" fill="#000000" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="90" letter-spacing="-2">NO HANDLERS.</text>
  <text x="40" y="290" fill="#E60000" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="90" letter-spacing="-2">JUST CAMBRIA.</text>

  <!-- Divider -->
  <line x1="40" y1="340" x2="760" y2="340" stroke="#000000" stroke-width="8" />

  <!-- Point 1: Cyan -->
  <!-- Shadow -->
  <rect x="48" y="388" width="712" height="90" fill="#000000" />
  <!-- Box -->
  <rect x="40" y="380" width="712" height="90" fill="#00FFFF" stroke="#000000" stroke-width="5" />
  <text x="60" y="425" fill="#000000" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">ANTI-MONOPOLY ENFORCEMENT</text>
  <text x="60" y="455" fill="#000000" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="20">SCRUTINY FOR SINGLE-BUYER MONOPOLIES.</text>

  <!-- Point 2: Yellow -->
  <rect x="48" y="498" width="712" height="90" fill="#000000" />
  <rect x="40" y="490" width="712" height="90" fill="#FFCC00" stroke="#000000" stroke-width="5" />
  <text x="60" y="535" fill="#000000" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">CO-OP REFORMATION</text>
  <text x="60" y="565" fill="#000000" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="20">LOGISTICS SUPPORT TO REBUILD COLLAPSED CO-OPS.</text>

  <!-- Point 3: Magenta -->
  <rect x="48" y="608" width="712" height="90" fill="#000000" />
  <rect x="40" y="600" width="712" height="90" fill="#FF00FF" stroke="#000000" stroke-width="5" />
  <text x="60" y="645" fill="#FFFFFF" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">SECTOR-WIDE CONTRACT FLOORS</text>
  <text x="60" y="675" fill="#FFFFFF" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="20">PROTECTING PRICES FROM SINGLE-BUYER LEVERAGE.</text>

  <!-- Point 4: Red -->
  <rect x="48" y="718" width="712" height="90" fill="#000000" />
  <rect x="40" y="710" width="712" height="90" fill="#E60000" stroke="#000000" stroke-width="5" />
  <text x="60" y="755" fill="#FFFFFF" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">RURAL LOGISTICS INVESTMENT</text>
  <text x="60" y="785" fill="#FFFFFF" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="20">FREIGHT LINES INDEPENDENT OF CORPORATE BUYERS.</text>

  <!-- Point 5: White -->
  <rect x="48" y="828" width="712" height="90" fill="#000000" />
  <rect x="40" y="820" width="712" height="90" fill="#FFFFFF" stroke="#000000" stroke-width="5" />
  <text x="60" y="865" fill="#000000" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">COASTAL &amp; INLAND UNITY</text>
  <text x="60" y="895" fill="#000000" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="20">ENFORCEMENT DOESN'T STOP AT THE WATERLINE.</text>

  <!-- Point 6: Black / Combat -->
  <!-- Shadow is Red for contrast -->
  <rect x="48" y="938" width="712" height="90" fill="#E60000" />
  <rect x="40" y="930" width="712" height="90" fill="#000000" stroke="#000000" stroke-width="5" />
  <text x="60" y="975" fill="#00FFFF" font-family="Impact, Arial Black, system-ui, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">PROACTIVE CO-OP SUPPORT</text>
  <text x="60" y="1005" fill="#FFFFFF" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="20">BONDING &amp; FREIGHT-SHARING FOR EXISTING CO-OPS.</text>

  <!-- Footer text -->
  <rect x="40" y="1070" width="712" height="60" fill="#000000" />
  <text x="64" y="1110" fill="#FFFFFF" font-family="Arial Black, system-ui, sans-serif" font-weight="900" font-size="30" letter-spacing="2">HENRIK VASMER FOR GOVERNOR</text>
</svg>
